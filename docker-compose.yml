#version: '3.8'

services:
  webui:
    build: .
    shm_size: "1gb"
    ports:
      - "1455:1455"
      - "60807:6080"
      # 如需使用 VNC 客户端直连可打开：
      # - "5900:5900"
    environment:
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=1455
      - DISPLAY=:99
      - ENABLE_VNC=1
      - VNC_PORT=5900
      - NOVNC_PORT=6080
      - DEBUG=0
      - LOG_LEVEL=info
    volumes:
      # 挂载数据目录以持久化数据库和日志
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
